name: build

on:
  push:
    paths-ignore:
    - 'doc/**'
    - '**.md'
  schedule:
  - cron: "0 0 * * *"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows_x86_64
            runs-on: windows-2022
          - target: macos_arm64
            runs-on: macos-15
          - target: ios
            runs-on: macos-15
          - target: ubuntu-22.04_x86_64
            runs-on: ubuntu-22.04
          - target: ubuntu-24.04_x86_64
            runs-on: ubuntu-24.04
          - target: android
            runs-on: ubuntu-24.04
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: _install
          key: ${{ matrix.target }}-v1-${{ hashFiles('VERSION', 'DEPS') }}
          restore-keys: |
            ${{ matrix.name }}-v1-
      - name: Prepare Ubuntu x86_64
        if: matrix.target == 'ubuntu-22.04_x86_64' || matrix.target == 'ubuntu-24.04_x86_64'
        run: |
          sudo apt install libgl-dev
      - run: python3 run.py build ${{ matrix.target }}
      - run: python3 run.py package
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-${{ matrix.target }}
          path: _package/

  package:
    name: Package SoraUnitySdk
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: _dist/
          pattern: package-*
          merge-multiple: true
      - name: Create Package
        run: |
          cd _dist
          zip -r ../SoraUnitySdk.zip .
      - name: Upload Package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SoraUnitySdk.zip
          path: SoraUnitySdk.zip

  release:
    name: Create Release
    if: contains(github.ref, 'tags/20')
    needs: [package]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: SoraUnitySdk.zip
      - name: Release
        run: |
          if [[ "${{ github.ref }}" == *canary* ]]; then
            prerelease="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            $prerelease \
            --title "${{ github.ref_name }}" \
            SoraUnitySdk.zip
        env:
          GH_TOKEN: ${{ github.token }}

  slack-notify:
    name: Slack Notify
    if: always()
    needs: [build, package, release]
    runs-on: ubuntu-slim
    permissions:
      actions: read
    steps:
      - uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-unity-sdk
